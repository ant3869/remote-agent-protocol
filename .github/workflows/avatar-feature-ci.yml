name: Avatar feature verification

on:
  pull_request:
    branches: [main]
    paths:
      - "remote_agent_protocol/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/avatar_tasks/**"
      - ".github/workflows/avatar-feature-ci.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  focused-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/animated-butler-avatar
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install system audio headers
        run: sudo apt-get update -qq && sudo apt-get install -y -qq portaudio19-dev >/dev/null
      - name: Install project and test tools
        run: python -m pip install -q -e ".[local]" pytest pytest-asyncio ruff
      - name: Execute staged implementation task
        shell: bash
        run: |
          shopt -s nullglob
          tasks=(.github/avatar_tasks/task*.py)
          if ((${#tasks[@]} == 1)); then
            python "${tasks[0]}"
          elif ((${#tasks[@]} > 1)); then
            echo "Expected at most one staged avatar task, found ${#tasks[@]}" >&2
            exit 1
          else
            echo "No staged implementation task."
          fi
      - name: Run focused Python tests
        shell: bash
        run: |
          tests=(tests/test_app_state.py tests/test_session_processors.py tests/test_web_gui.py)
          [[ -f tests/test_avatar_settings.py ]] && tests+=(tests/test_avatar_settings.py)
          [[ -f tests/test_avatar_audio.py ]] && tests+=(tests/test_avatar_audio.py)
          python -m pytest "${tests[@]}" -q --disable-warnings --maxfail=1
      - name: Run avatar JavaScript tests
        shell: bash
        run: |
          shopt -s nullglob
          tests=(tests/js/*.test.mjs)
          if ((${#tests[@]})); then
            node --test "${tests[@]}"
          else
            echo "No avatar JavaScript tests yet."
          fi
