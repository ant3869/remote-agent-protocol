name: Avatar feature verification

on:
  pull_request:
    branches: [main]
    paths:
      - "remote_agent_protocol/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/avatar-feature-ci.yml"
  workflow_dispatch:

jobs:
  focused-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install system audio headers
        run: sudo apt-get update && sudo apt-get install -y portaudio19-dev
      - name: Install project and test tools
        run: python -m pip install --upgrade pip && python -m pip install -e ".[local]" pytest pytest-asyncio
      - name: Run focused Python tests
        shell: bash
        run: |
          tests=(tests/test_app_state.py tests/test_session_processors.py tests/test_web_gui.py)
          [[ -f tests/test_avatar_audio.py ]] && tests+=(tests/test_avatar_audio.py)
          python -m pytest "${tests[@]}" -v
      - name: Run avatar JavaScript tests
        shell: bash
        run: |
          shopt -s nullglob
          tests=(tests/js/*.test.mjs)
          if ((${#tests[@]})); then
            node --test "${tests[@]}"
          else
            echo "No avatar JavaScript tests yet."
          fi
