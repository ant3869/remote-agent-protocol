name: Avatar task runner

on:
  push:
    branches:
      - feature/animated-butler-avatar
    paths:
      - ".github/avatar_tasks/**"
      - ".github/workflows/avatar-task-runner.yml"

permissions:
  contents: write

concurrency:
  group: avatar-task-runner
  cancel-in-progress: false

jobs:
  execute-task:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/animated-butler-avatar
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install system audio headers
        run: sudo apt-get update -qq && sudo apt-get install -y -qq portaudio19-dev >/dev/null
      - name: Install project test dependencies
        run: python -m pip install -q -e ".[local]" pytest pytest-asyncio ruff
      - name: Execute staged task
        shell: bash
        run: |
          shopt -s nullglob
          tasks=(.github/avatar_tasks/task*.py)
          if ((${#tasks[@]} != 1)); then
            echo "Expected exactly one staged avatar task, found ${#tasks[@]}" >&2
            exit 1
          fi
          python "${tasks[0]}"
